<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - SolarClean</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="apple-touch-icon" href="assets/images/favicon.png">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="assets/images/logo.png" style="height:40px; margin-right:10px;" alt="Logo"> SolarClean
    </a>
    <div class="collapse navbar-collapse justify-content-center">
      <ul class="navbar-nav">
        <li class="nav-item mx-2"><a class="nav-link px-3" href="index.html">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link px-3" href="store.html">Store</a></li>
        <li class="nav-item mx-2"><a class="nav-link px-3" href="contact.html">Contact Us</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="checkout-box">
        <h3 class="text-center mb-4">Confirm Order</h3>
        <form id="checkout-form">
          <div class="mb-3">
            <label>Product</label>
            <input type="text" name="product_name" id="p-name" class="form-control" readonly style="background:#eee">
          </div>
          <div class="mb-3">
            <label>Your Name</label>
            <input type="text" name="customer_name" id="customer_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>Phone Number</label>
            <input type="tel" name="phone" id="phone" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>Address</label>
            <textarea name="address" id="address" class="form-control" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100" style="background:#142F4E">Submit Order</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/checkout.js"></script>
</body>
</html>
