<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout — SolarClean</title>
<meta name="description" content="Confirm your SolarClean order.">

<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="apple-touch-icon" href="assets/images/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/tailwind-config.js"></script>
<link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="font-body text-ink-900 bg-mist antialiased min-h-screen flex flex-col">

<header id="navbar" class="sticky top-0 z-50 bg-white transition-all duration-300">
  <nav class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="flex items-center justify-between py-4">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/images/logo-dark.png" class="h-9 w-9 object-contain" alt="SolarClean logo">
        <span class="font-display font-bold text-lg">Solar<span class="text-brand">Clean</span></span>
      </a>
      <div class="hidden md:flex items-center gap-8 font-medium text-ink-900/75">
        <a href="index.html" class="hover:text-brand transition-colors">Home</a>
        <a href="store.html" class="hover:text-brand transition-colors">Store</a>
        <a href="contact.html" class="hover:text-brand transition-colors">Contact</a>
      </div>
    </div>
  </nav>
</header>

<main class="flex-1 flex items-center justify-center px-6 py-14">
  <div class="w-full max-w-lg">
    <div class="text-center mb-8">
      <span class="inline-flex items-center gap-2 rounded-full bg-white border border-ink-900/10 px-4 py-1.5 text-xs font-semibold tracking-wide text-brand shadow-card">
        ONE STEP AWAY
      </span>
      <h1 class="mt-5 font-display font-extrabold text-3xl sm:text-4xl">Confirm Your Order</h1>
      <p class="mt-2 text-ink-900/60">Fill in your details and we'll follow up to arrange delivery.</p>
    </div>

    <div class="rounded-xl2 bg-white border border-ink-900/8 shadow-soft p-6 sm:p-9 fade-up in-view">
      <form id="checkoutForm" action="https://formsubmit.co/ajax/ngtsolarsolutionegypt@gmail.com" method="POST" class="space-y-5">
        <input type="hidden" name="_subject" value="New order — SolarClean site">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <div>
          <label class="block text-sm font-semibold mb-1.5">Product</label>
          <input type="text" name="product_name" id="p-name" readonly
            class="w-full rounded-xl border border-ink-900/15 bg-mist px-4 py-3 text-sm font-medium text-ink-900/70">
        </div>
        <div>
          <label for="customer_name" class="block text-sm font-semibold mb-1.5">Your Name</label>
          <input type="text" id="customer_name" name="customer_name" required placeholder="Full name"
            class="w-full rounded-xl border border-ink-900/15 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
        <div>
          <label for="phone" class="block text-sm font-semibold mb-1.5">Phone Number</label>
          <input type="tel" id="phone" name="phone" required placeholder="Your phone"
            class="w-full rounded-xl border border-ink-900/15 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
        <div>
          <label for="address" class="block text-sm font-semibold mb-1.5">Address</label>
          <textarea id="address" name="address" rows="3" required placeholder="Delivery address"
            class="w-full rounded-xl border border-ink-900/15 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent"></textarea>
        </div>

        <button type="submit" class="w-full rounded-xl bg-brand text-white font-semibold py-3.5 hover:bg-brand-dark transition-colors shadow-soft">
          Submit Order
        </button>

        <p id="formStatus" class="hidden"></p>
      </form>
    </div>

    <p class="text-center mt-6 text-sm text-ink-900/50">
      <a href="store.html" class="text-brand font-medium hover:underline"><i class="fa-solid fa-arrow-left text-xs"></i> Back to Store</a>
    </p>
  </div>
</main>

<footer class="bg-ink-900">
  <div class="mx-auto max-w-7xl px-6 lg:px-8 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-white/40">
    <p>© 2026 SolarClean. All rights reserved.</p>
    <p>Built for cleaner, smarter solar.</p>
  </div>
</footer>

<script>
  document.getElementById('p-name').value = new URLSearchParams(window.location.search).get('order') || 'General Inquiry';
</script>
<script src="assets/js/forms.js"></script>
<script>
  handleFormspreeSubmit(
    document.getElementById('checkoutForm'),
    document.getElementById('formStatus'),
    "Order received — we'll contact you shortly to confirm delivery."
  );
</script>
</body>
</html>
