<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - SolarClean</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="apple-touch-icon" href="assets/images/favicon.png">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="assets/images/logo.png" style="height:40px; margin-right:10px;" alt="Logo"> SolarClean
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item mx-2"><a class="nav-link px-3" href="index.html">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link px-3" href="store.html">Store</a></li>
        <li class="nav-item mx-2"><a class="nav-link active px-3" href="contact.html">Contact Us</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container text-center">
  <div class="contact-header">
    <h1>Get In Touch</h1>
    <p class="text-muted mb-5">Have a question? We'd love to hear from you.</p>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-md-4">
      <div class="info-card">
        <i class="fas fa-phone info-icon"></i>
        <h5>Call Us</h5>
        <p class="text-muted">+20 123 456 789</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="info-card">
        <i class="fas fa-envelope info-icon"></i>
        <h5>Email Us</h5>
        <p class="text-muted">info@solarclean.com</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="info-card">
        <i class="fas fa-location-dot info-icon"></i>
        <h5>Visit Us</h5>
        <p class="text-muted">Cairo, Egypt</p>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mb-5">
    <div class="col-lg-10 text-start">
      <div class="form-card shadow">
        <h3 class="fw-bold mb-4 text-center">Send us a message</h3>

        <form id="contact-form">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Name</label>
              <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Email</label>
              <input type="email" id="email" name="email" class="form-control" placeholder="Your Email" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Phone Number</label>
              <input type="tel" id="phone" name="phone" class="form-control" placeholder="Your Phone" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Subject</label>
            <input type="text" id="subject" name="subject" class="form-control" placeholder="How can we help?" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Message</label>
            <textarea id="message" name="message" class="form-control" rows="5" placeholder="Write your message here..." required></textarea>
          </div>
          <button type="submit" class="btn btn-send shadow-sm">Send Message <i class="fas fa-paper-plane ms-2"></i></button>
        </form>

      </div>
    </div>
  </div>
</div>

<footer>
  <p class="mb-0">© 2026 SolarClean - All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/contact.js"></script>
</body>
</html>
